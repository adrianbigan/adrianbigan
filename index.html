        /* Fundal Portocaliu Profesional */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 850px; margin: 0 auto; padding: 20px; background-color: #ffb366; }
        
        /* Mesajul care curge (Marquee) */
        .promo-marquee {
            background-color: #004aad;
            color: #ffffff;
            padding: 12px;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #fff;
            text-transform: uppercase;
        }

        header { 
            background: #2c3e50; 
            color: #fff; 
            padding: 30px; 
            border-radius: 12px; 
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .header-text { flex: 1; min-width: 300px; padding-right: 20px; }
        header h1 { margin: 0 0 10px 0; font-size: 2.2rem; }
        
        .header-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); margin-bottom: 25px; }
        
        h2 { color: #2c3e50; border-bottom: 2px solid #ffb366; padding-bottom: 10px; }
        
        /* Sectiune YouTube */
        .video-container { 
            position: relative; width: 100%; height: 0; padding-bottom: 56.25%; 
            overflow: hidden; border-radius: 10px; margin-top: 15px; display: none; 
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .btn-muzica { 
            background: #2c3e50; color: white; border: none; padding: 12px 25px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px;
        }
