<html lang="ro">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrian Bigan - Expert Logistică</title>
    <style>
        /* AM MĂRIT SCRISUL PENTRU A FI MAI UȘOR DE CITIT */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            line-height: 1.8; 
            color: #1a1a1a; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #ffb366; 
            font-size: 22px; /* Scris mai mare */
        }
        
        .promo-marquee {
            background-color: #004aad;
            color: #ffffff;
            padding: 15px;
            font-weight: bold;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 3px solid #fff;
            text-transform: uppercase;
            font-size: 24px;
        }

        header { 
            background: #2c3e50; 
            color: #fff; 
            padding: 40px; 
            border-radius: 15px; 
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        header h1 { margin: 0; font-size: 40px; }
        header p { font-size: 24px; opacity: 0.9; }
        
        .header-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid #fff;
            object-fit: cover;
        }

        .card { 
            background: #fff; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            margin-bottom: 30px; 
        }
        
        h2 { color: #2c3e50; border-bottom: 4px solid #ffb366; padding-bottom: 10px; font-size: 32px; }
        
        .video-container { 
            position: relative; width: 100%; height: 0; padding-bottom: 56.25%; 
            overflow: hidden; border-radius: 15px; margin-top: 20px; display: none; 
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .btn-muzica { 
            background: #e67e22; color: white; border: none; padding: 20px 40px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 26px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
